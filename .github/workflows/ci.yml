name: CI

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend/Dockerfile -t resos-backend:ci ./backend

      - name: Build frontend image
        run: docker build -f docker/frontend/Dockerfile -t resos-frontend:ci .

      - name: Validate production compose file
        env:
          POSTGRES_PASSWORD: ci-test
          SPRING_DATASOURCE_PASSWORD: ci-test
          RESOS_JWT_PRIVATE_KEY: ci-dummy-private-key
          RESOS_JWT_PUBLIC_KEY: ci-dummy-public-key
        run: docker compose -f docker-compose.prod.yml config
