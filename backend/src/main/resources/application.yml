spring:
  application:
    name: resos-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080
  servlet:
    context-path: /

resos:
  jwt:
    issuer: resos-api
    access-token-expiration: PT15M
    refresh-token-expiration: P7D
    refresh-cookie-name: refreshToken
    refresh-cookie-path: /api/v1/auth
  cors:
    allowed-origins: http://localhost:4200,http://127.0.0.1:4200

management:
  endpoints:
    web:
      exposure:
        include: health,info
