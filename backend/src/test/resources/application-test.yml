spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///resos
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    show-sql: false
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

resos:
  jwt:
    generate-keys: true

logging:
  level:
    com.resos: INFO
