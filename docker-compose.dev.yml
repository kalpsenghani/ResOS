# Full-stack development environment (all services in containers).
# Uses the dev Spring profile with ephemeral JWT keys.

name: resos-dev-stack

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resos
      POSTGRES_USER: resos
      POSTGRES_PASSWORD: resos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resos -d resos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resos
      SPRING_DATASOURCE_USERNAME: resos
      SPRING_DATASOURCE_PASSWORD: resos_dev
      REDIS_HOST: redis
      RESOS_CORS_ALLOWED_ORIGINS: http://localhost
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
