# Production-like stack. Copy .env.example to .env and set secrets before starting.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

name: resos-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resos}
      POSTGRES_USER: ${POSTGRES_USER:-resos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resos} -d ${POSTGRES_DB:-resos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-resos}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-resos}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      RESOS_JWT_PRIVATE_KEY: ${RESOS_JWT_PRIVATE_KEY:?RESOS_JWT_PRIVATE_KEY is required}
      RESOS_JWT_PUBLIC_KEY: ${RESOS_JWT_PUBLIC_KEY:?RESOS_JWT_PUBLIC_KEY is required}
      RESOS_CORS_ALLOWED_ORIGINS: ${RESOS_CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
  redis_prod_data:
