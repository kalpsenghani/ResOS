# Local development infrastructure (PostgreSQL + Redis).
# Run backend and frontend on the host with mvnw / npm start.
# For a full containerized dev stack, use: docker compose -f docker-compose.dev.yml up -d

name: resos-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: resos-postgres
    environment:
      POSTGRES_DB: resos
      POSTGRES_USER: resos
      POSTGRES_PASSWORD: resos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resos -d resos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
