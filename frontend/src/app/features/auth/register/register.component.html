<div class="auth-card">
  <div class="auth-card__header">
    <h1>Start your free trial</h1>
    <p>Create your restaurant workspace in minutes</p>
  </div>

  @if (error()) {
    <div class="auth-error" role="alert">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label class="field" [class.field--invalid]="form.controls.tenantName.touched && form.controls.tenantName.invalid">
      <span class="field-label">Restaurant name</span>
      <input class="input" formControlName="tenantName" />
      @if (form.controls.tenantName.touched && form.controls.tenantName.invalid) {
        <span class="field-error">Restaurant name is required</span>
      }
    </label>

    <label class="field" [class.field--invalid]="form.controls.tenantSlug.touched && form.controls.tenantSlug.invalid">
      <span class="field-label">Restaurant slug</span>
      <input class="input" formControlName="tenantSlug" placeholder="joes-pizza" (input)="onSlugInput()" />
      @if (form.controls.tenantSlug.touched && form.controls.tenantSlug.hasError('required')) {
        <span class="field-error">Restaurant slug is required</span>
      } @else if (form.controls.tenantSlug.touched && form.controls.tenantSlug.hasError('pattern')) {
        <span class="field-error">Use lowercase letters, numbers, and hyphens only (e.g. joes-pizza)</span>
      } @else {
        <span class="field-hint">Lowercase, numbers &amp; hyphens (e.g. joes-pizza)</span>
      }
    </label>

    <div class="name-row">
      <label class="field" [class.field--invalid]="form.controls.firstName.touched && form.controls.firstName.invalid">
        <span class="field-label">First name</span>
        <input class="input" formControlName="firstName" />
        @if (form.controls.firstName.touched && form.controls.firstName.invalid) {
          <span class="field-error">First name is required</span>
        }
      </label>
      <label class="field" [class.field--invalid]="form.controls.lastName.touched && form.controls.lastName.invalid">
        <span class="field-label">Last name</span>
        <input class="input" formControlName="lastName" />
        @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
          <span class="field-error">Last name is required</span>
        }
      </label>
    </div>

    <label class="field" [class.field--invalid]="form.controls.email.touched && form.controls.email.invalid">
      <span class="field-label">Email</span>
      <input class="input" type="email" formControlName="email" autocomplete="email" />
      @if (form.controls.email.touched && form.controls.email.hasError('required')) {
        <span class="field-error">Email is required</span>
      } @else if (form.controls.email.touched && form.controls.email.hasError('email')) {
        <span class="field-error">Enter a valid email address</span>
      }
    </label>

    <label class="field" [class.field--invalid]="form.controls.password.touched && form.controls.password.invalid">
      <span class="field-label">Password</span>
      <input class="input" type="password" formControlName="password" autocomplete="new-password" />
      @if (form.controls.password.touched && form.controls.password.hasError('required')) {
        <span class="field-error">Password is required</span>
      } @else if (form.controls.password.touched && form.controls.password.hasError('minlength')) {
        <span class="field-error">Password must be at least 12 characters</span>
      }
    </label>

    <button mat-flat-button color="primary" type="submit" [disabled]="loading()" class="submit-btn">
      @if (loading()) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Create account
      }
    </button>
  </form>

  <p class="auth-switch">
    Already have an account?
    <a routerLink="/login">Sign in</a>
  </p>
</div>
