<div class="auth-card">
  <div class="auth-card__header">
    <h1>Start your free trial</h1>
    <p>Create your restaurant workspace in minutes</p>
  </div>

  @if (error()) {
    <div class="auth-error" role="alert">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <mat-form-field appearance="outline">
      <mat-label>Restaurant name</mat-label>
      <input matInput formControlName="tenantName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Restaurant slug</mat-label>
      <input matInput formControlName="tenantSlug" placeholder="joes-pizza" />
      <mat-hint>Used in your login URL</mat-hint>
    </mat-form-field>

    <div class="name-row">
      <mat-form-field appearance="outline">
        <mat-label>First name</mat-label>
        <input matInput formControlName="firstName" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Last name</mat-label>
        <input matInput formControlName="lastName" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-hint>Minimum 12 characters</mat-hint>
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit" [disabled]="loading()" class="submit-btn">
      @if (loading()) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Create account
      }
    </button>
  </form>

  <p class="auth-switch">
    Already have an account?
    <a routerLink="/auth/login">Sign in</a>
  </p>
</div>
