<div class="dashboard">
  <header class="dashboard-header">
    <div>
      <h1>Dashboard</h1>
      <p>Welcome, {{ user()?.firstName }} — {{ tenant()?.name }}</p>
    </div>
    <div class="dashboard-actions">
      <a mat-stroked-button routerLink="/settings">Settings</a>
      <button mat-stroked-button type="button" (click)="logout()">Sign out</button>
    </div>
  </header>

  <section class="placeholder">
    <p>Phase 4 will add KPI widgets, navigation, and analytics here.</p>
  </section>
</div>
