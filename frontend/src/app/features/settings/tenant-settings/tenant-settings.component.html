<div class="settings-page">
  <header class="settings-header">
    <div>
      <a routerLink="/dashboard" class="back-link">← Dashboard</a>
      <h1>Tenant settings</h1>
      <p>Manage your restaurant workspace</p>
    </div>
  </header>

  @if (error()) {
    <div class="settings-error" role="alert">{{ error() }}</div>
  }

  @if (loading()) {
    <mat-spinner diameter="32"></mat-spinner>
  } @else if (tenant(); as t) {
    <section class="settings-card" motionInView="slide-up">
      <div class="meta">
        <p><strong>Slug:</strong> {{ t.slug }}</p>
        <p><strong>Plan:</strong> {{ t.subscription?.plan ?? '—' }} ({{ t.subscription?.status ?? '—' }})</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="settings-form">
        <label class="field">
          <span class="field-label">Restaurant name</span>
          <input class="input" formControlName="name" />
        </label>

        <label class="field">
          <span class="field-label">Phone</span>
          <input class="input" formControlName="phone" />
        </label>

        <label class="field">
          <span class="field-label">Timezone</span>
          <input class="input" formControlName="timezone" />
        </label>

        <label class="field">
          <span class="field-label">Currency</span>
          <input class="input" formControlName="currency" />
        </label>

        <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
          @if (saving()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Save changes
          }
        </button>
      </form>
    </section>
  }
</div>
