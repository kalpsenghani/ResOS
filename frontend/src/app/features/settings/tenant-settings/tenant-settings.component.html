<div class="settings-page">
  <header class="settings-header">
    <div>
      <a routerLink="/dashboard" class="back-link">← Dashboard</a>
      <h1>Tenant settings</h1>
      <p>Manage your restaurant workspace</p>
    </div>
  </header>

  @if (error()) {
    <div class="settings-error" role="alert">{{ error() }}</div>
  }

  @if (loading()) {
    <mat-spinner diameter="32"></mat-spinner>
  } @else if (tenant(); as t) {
    <section class="settings-card">
      <div class="meta">
        <p><strong>Slug:</strong> {{ t.slug }}</p>
        <p><strong>Plan:</strong> {{ t.subscription?.plan ?? '—' }} ({{ t.subscription?.status ?? '—' }})</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="settings-form">
        <mat-form-field appearance="outline">
          <mat-label>Restaurant name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Timezone</mat-label>
          <input matInput formControlName="timezone" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Currency</mat-label>
          <input matInput formControlName="currency" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
          @if (saving()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Save changes
          }
        </button>
      </form>
    </section>
  }
</div>
