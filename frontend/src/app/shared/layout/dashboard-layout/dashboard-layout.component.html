<div class="dashboard-layout" [class.dashboard-layout--collapsed]="sidebarCollapsed()">
  <app-sidebar
    [items]="navItems"
    [collapsed]="sidebarCollapsed()"
    (toggleCollapsed)="toggleSidebar()"
  />

  <div class="dashboard-layout__main">
    <header class="dashboard-header">
      <div class="dashboard-header__info">
        <h2>{{ tenantDetails()?.name ?? tenant()?.name ?? 'Restaurant' }}</h2>
        <p>Welcome back, {{ user()?.firstName }}</p>
      </div>

      <div class="dashboard-header__actions">
        <app-button variant="ghost" icon="dark_mode" (clicked)="theme.toggle()">
          {{ theme.mode() === 'light' ? 'Dark' : 'Light' }}
        </app-button>

        <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item disabled>
            <mat-icon>person</mat-icon>
            <span>{{ user()?.email }}</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
          </button>
        </mat-menu>
      </div>
    </header>

    <main class="dashboard-content">
      <router-outlet />
    </main>
  </div>
</div>
