<div class="dashboard-layout" [class.dashboard-layout--collapsed]="sidebarCollapsed()">
  <app-sidebar
    [groups]="navGroups"
    [collapsed]="sidebarCollapsed()"
    (toggleCollapsed)="toggleSidebar()"
  />

  <div class="dashboard-layout__main">
    <header class="topbar">
      <div class="topbar__info">
        <span class="topbar__badge">
          <span class="topbar__badge-dot"></span>
          Live
        </span>
        <div class="topbar__title">
          <h2>{{ restaurantName() }}</h2>
          <p>Welcome back, {{ user()?.firstName }}</p>
        </div>
      </div>

      <div class="topbar__actions">
        <button
          type="button"
          class="topbar__icon-btn"
          (click)="theme.toggle()"
          [attr.aria-label]="theme.mode() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
        >
          <mat-icon>{{ theme.mode() === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
        </button>

        <button type="button" class="user-chip" [matMenuTriggerFor]="userMenu" aria-label="User menu">
          <span class="user-chip__avatar">{{ initials() }}</span>
          <span class="user-chip__meta">
            <span class="user-chip__name">{{ user()?.firstName }} {{ user()?.lastName }}</span>
            <span class="user-chip__role">{{ user()?.roles?.[0] }}</span>
          </span>
          <mat-icon class="user-chip__chevron">expand_more</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu" xPosition="before">
          <div class="user-menu__header">
            <span class="user-chip__avatar">{{ initials() }}</span>
            <div>
              <p class="user-menu__name">{{ user()?.firstName }} {{ user()?.lastName }}</p>
              <p class="user-menu__email">{{ user()?.email }}</p>
            </div>
          </div>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
          </button>
        </mat-menu>
      </div>
    </header>

    <main class="dashboard-content">
      <router-outlet />
    </main>
  </div>
</div>
